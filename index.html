      border-radius: 0 8px 8px 0;
      color: #eff7ff;

      height: 52px;

      object-position: center;

      .compare { grid-template-columns:1fr; gap: 12px; }
      .vs { display:none; }

    "body": "沈宛徵營養師簡介",
    "qr": "images/wan-rd-qr.png",
    "bg": "images/cgm-bg.png",
    "mark": "[BG]"
  }
];
    const iconText = ["AI", "CGM", "RX", "90", "DATA", "TIR", "BIA", "HRV"];
    const esc = (v) => String(v ?? "").replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
    const bulletList = (items=[]) => `<ul class="bullets">${items.map(x => `<li>${esc(x)}</li>`).join("")}</ul>`;
    const cardGrid = (items=[]) => `<div class="grid ${items.length > 4 ? "six" : ""}">${items.map((it, i) => `<div class="card"><div class="icon">${iconText[i % iconText.length]}</div><b>${esc(it[0])}</b><span>${esc(it[1])}</span></div>`).join("")}</div>`;
    const stats = (items=[]) => `<div class="stats">${items.map(s => `<div class="stat"><div class="num">${esc(s[0])}</div><div class="label">${esc(s[1])}</div></div>`).join("")}</div>`;
    const sectionAttrs = (s) => {
      const bg = s.bg ? ` data-background-image="${esc(s.bg)}" data-background-opacity="${s.n === 1 ? "0.42" : "0.18"}" data-background-size="contain" data-background-repeat="no-repeat"` : "";
      const sid = s.type === "poll" ? "slide-poll" : (s.type === "wordcloud" ? "slide-wordcloud" : `slide-${s.n}`);
      return `id="${sid}" class="deck-bg"${bg}`;
    };
    const head = (s) => `<div class="kicker">${String(s.n).padStart(2,"0")} / ${esc(s.tag)} ${s.mark ? `<span class="mark">${esc(s.mark)}</span>` : ""}</div>`;

    function renderSlide(s) {
      if (s.type === "cover") {
        const qr = s.qr ? `<div class="qr-panel"><img src="${esc(s.qr)}" alt="${esc(s.qrLabel || "QR Code")}"><span>${esc(s.qrLabel || "QR Code")}</span></div>` : "";
        return `<section ${sectionAttrs(s)}><div class="shade"></div><div class="cover-layout"><div class="title-slide">${head(s)}<h1>${esc(s.title)}</h1><h2 class="subtitle">${esc(s.subtitle)}</h2><p class="body">${esc(s.body)}</p><div class="meta-row">${(s.meta||[]).map(m => `<span class="pill">${esc(m)}</span>`).join("")}</div></div></div>${qr}</section>`;
      }
      if (s.type === "section") {
        return `<section ${sectionAttrs(s)}><div class="shade"></div><div class="layout title-slide">${head(s)}<h1>${esc(s.title)}</h1><h2 class="subtitle">${esc(s.subtitle)}</h2><p class="body">${esc(s.body)}</p></div></section>`;
      }
      if (s.type === "cards") {
        return `<section ${sectionAttrs(s)}><div class="layout">${head(s)}<h2>${esc(s.title)}</h2>${cardGrid(s.items)}</div></section>`;
      }
      if (s.type === "stats") {
        return `<section ${sectionAttrs(s)}><div class="layout">${head(s)}<h2>${esc(s.title)}</h2>${stats(s.stats)}${bulletList(s.bullets)}</div></section>`;
      }
      if (s.type === "split" || s.type === "splitLarge" || s.type === "case") {
        const splitClass = s.type === "splitLarge" ? "layout split split-large" : "layout split";
        return `<section ${sectionAttrs(s)}><div class="${splitClass}"><div>${head(s)}<h2>${esc(s.title)}</h2>${s.stats ? stats(s.stats) : ""}${bulletList(s.bullets)}</div><div class="image-frame"><img src="${esc(s.image)}" alt=""></div></div></section>`;
      }
      if (s.type === "compare") {
        return `<section ${sectionAttrs(s)}><div class="layout">${head(s)}<h2>${esc(s.title)}</h2><div class="compare"><div class="compare-col left"><h3>${esc(s.leftTitle)}</h3><ul>${s.left.map(x => `<li>${esc(x)}</li>`).join("")}</ul></div><div class="vs">VS</div><div class="compare-col right"><h3>${esc(s.rightTitle)}</h3><ul>${s.right.map(x => `<li>${esc(x)}</li>`).join("")}</ul></div></div></div></section>`;
      }
      if (s.type === "table") {
        return `<section ${sectionAttrs(s)}><div class="layout">${head(s)}<h2>${esc(s.title)}</h2><table><thead><tr>${s.columns.map(c => `<th>${esc(c)}</th>`).join("")}</tr></thead><tbody>${s.rows.map(r => `<tr>${r.map(c => `<td>${esc(c)}</td>`).join("")}</tr>`).join("")}</tbody></table></div></section>`;
      }
      if (s.type === "timeline") {
        return `<section ${sectionAttrs(s)}><div class="layout">${head(s)}<h2>${esc(s.title)}</h2><div class="timeline">${s.items.map(it => `<div class="timeline-item"><b>${esc(it[0])}</b><span>${esc(it[1])}</span></div>`).join("")}</div></div></section>`;
      }
      if (s.type === "quote") {
        return `<section ${sectionAttrs(s)}><div class="layout">${head(s)}<h2>${esc(s.title)}</h2><div class="quote">${esc(s.quote)}</div></div></section>`;
      }
      if (s.type === "poll") {
        return `<section ${sectionAttrs(s)}><div class="layout">${head(s)}<h2>${esc(s.title)}</h2><div class="poll-options" id="poll-options">${s.options.map((o,i) => `<button class="poll-btn" data-vote="${i}"><b>${esc(o)}</b><div class="bar-wrap"><div class="bar" id="poll-bar-${i}"></div></div><span id="poll-pct-${i}" style="color:#a9bdcf;font-size:.76em;">0%</span></button>`).join("")}</div><p class="lead" style="margin-top:18px;">已投票：<span id="poll-total">0</span> 人</p></div></section>`;
      }
      if (s.type === "wordcloud") {
        return `<section ${sectionAttrs(s)}><div class="layout">${head(s)}<h2>${esc(s.title)}</h2><p class="lead">${esc(s.body)}</p><div class="wc-grid"><div class="panel" style="display:flex;flex-direction:column;gap:12px;"><div><h3 style="margin:0 0 10px;color:var(--accent2);">輸入關鍵詞</h3><input id="wc-input" type="text" maxlength="20" placeholder="例如：肌肉流失、TIR、服務定價"><button class="btn" id="wc-btn" style="width:100%;margin-top:10px;">送出</button></div><div class="panel" style="flex:1;overflow:auto;"><h3 style="margin:0 0 10px;color:var(--warn);">熱門答案</h3><div id="wc-list" style="font-size:.36em;color:#d8e8f7;"></div><p style="font-size:.32em;color:#9fb4c8;">總提交：<span id="wc-total">0</span>　不同答案：<span id="wc-unique">0</span></p></div></div><div class="panel" style="position:relative;overflow:hidden;"><canvas id="wc-canvas"></canvas><div id="wc-empty" style="position:absolute;inset:0;display:grid;place-items:center;color:#6f8498;font-size:.42em;text-align:center;">等待第一個關鍵詞</div></div></div></div></section>`;
      }
      if (s.type === "imageOnly") {
        return `<section ${sectionAttrs(s)}><div class="layout image-only">${s.title ? `<div class="kicker">${String(s.n).padStart(2,"0")} / ${esc(s.tag)}</div><h2>${esc(s.title)}</h2>` : ""}<div class="image-only-frame"><img src="${esc(s.image)}" alt=""></div></div></section>`;
      }
      if (s.type === "viz") {
        return `<section ${sectionAttrs(s)}><div class="layout">${head(s)}<h2>${esc(s.title)}</h2><div class="viz-stage"><div class="viz-before"><div class="viz-chip"><b>Day 0</b><span>基準線</span></div><div class="viz-chip"><b>Day 8</b><span>誘導期</span></div><div class="viz-chip"><b>Day 31</b><span>優化期</span></div><div class="viz-chip"><b>Day 61</b><span>穩定期</span></div></div><div class="viz-after" id="viz-after"><div class="viz-chip"><b>啟動</b><span>CGM + 目標</span></div><div class="viz-chip"><b>偵測</b><span>餐後峰值</span></div><div class="viz-chip"><b>調整</b><span>蛋白質 + 阻力</span></div><div class="viz-chip"><b>維持</b><span>預警 + 自管</span></div></div><div class="viz-divider" id="viz-divider"></div></div><input id="viz-slider" type="range" min="0" max="100" value="0"><p class="lead">拖曳滑桿，從「時間階段」揭露到「管理任務」。</p></div></section>`;
      }
      if (s.type === "qa") {
        return `<section ${sectionAttrs(s)}><div class="layout qa">${head(s)}<div><h1>${esc(s.title)}</h1><p class="lead" style="text-align:center;">${esc(s.body)}</p></div></div></section>`;
      }
      if (s.type === "resources") {
        return `<section ${sectionAttrs(s)}><div class="shade"></div><div class="layout">${head(s)}<h2>${esc(s.title)}</h2><p class="lead">${esc(s.body)}</p><ul class="source-list">${s.bullets.map(x => `<li>${esc(x)}</li>`).join("")}</ul></div></section>`;
      }
      if (s.type === "resourcesQr") {
        return `<section ${sectionAttrs(s)}><div class="shade"></div><div class="layout resources-layout">${head(s)}<h2>${esc(s.title)}</h2><p class="lead">${esc(s.body)}</p><ul class="source-list">${s.bullets.map(x => `<li>${esc(x)}</li>`).join("")}</ul></div><div class="qr-panel"><img src="${esc(s.qr)}" alt="${esc(s.body)}"><span>${esc(s.body)}</span></div></section>`;
      }
      return `<section ${sectionAttrs(s)}><div class="layout">${head(s)}<h2>${esc(s.title)}</h2>${bulletList(s.bullets)}</div></section>`;
    }

    document.getElementById("slides").innerHTML = slideData.map(renderSlide).join("");
  </script>

  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.js"></script>
  <script>
    Reveal.initialize({
      hash: true,
      transition: "slide",
      transitionSpeed: "default",
      backgroundTransition: "fade",
      center: true,
      progress: true,
      controls: true,
      slideNumber: "c/t"
    });

    const vizSlider = document.getElementById("viz-slider");
    if (vizSlider) {
      vizSlider.addEventListener("input", function() {
        const v = +this.value;
        document.getElementById("viz-after").style.clipPath = `inset(0 ${100 - v}% 0 0)`;
        document.getElementById("viz-divider").style.left = v + "%";
      });
    }
  </script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
    import {
      getFirestore, collection, addDoc, onSnapshot, serverTimestamp, query, orderBy,
      doc, setDoc
    } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAYQhNavPSce17XtvDC5xnXyl9iUhW9KjA",
      authDomain: "teacherstudy-109ef.firebaseapp.com",
      projectId: "teacherstudy-109ef",
      storageBucket: "teacherstudy-109ef.firebasestorage.app",
      messagingSenderId: "196599230156",
      appId: "1:196599230156:web:cfe55d364df3ae1b9d5c69"
    };
    const app = initializeApp(firebaseConfig);
    const fdb = getFirestore(app);

    const pollButtons = document.querySelectorAll(".poll-btn");
    if (pollButtons.length) {
      const pollRef = doc(fdb, "ai_cgm_weight_loss_poll", "slide_18");
      const userId = "u_" + Math.random().toString(36).slice(2, 10);
      pollButtons.forEach(btn => {
        btn.addEventListener("click", async () => {
          const data = { updated_at: serverTimestamp() };
          data[`votes.${userId}`] = btn.dataset.vote;
          await setDoc(pollRef, data, { merge: true });
        });
      });
      onSnapshot(pollRef, snap => {
        const votes = Object.values((snap.data() || {}).votes || {});
        const total = votes.length;
        document.getElementById("poll-total").textContent = total;
        for (let i = 0; i < 4; i++) {
          const count = votes.filter(v => String(v) === String(i)).length;
          const pct = total ? Math.round(count / total * 100) : 0;
          document.getElementById(`poll-bar-${i}`).style.width = pct + "%";
          document.getElementById(`poll-pct-${i}`).textContent = pct + "%";
        }
      });
    }

    const colors = ["#4fc3f7", "#e8643a", "#ffb74d", "#81c784", "#ce93d8", "#80deea"];
    const wcInput = document.getElementById("wc-input");
    const wcButton = document.getElementById("wc-btn");
    const wcCanvas = document.getElementById("wc-canvas");
    let wordsRef;
    async function submitWord() {
      const word = wcInput?.value.trim();
      if (!word) return;
      wcButton.disabled = true;
      try {
        await addDoc(wordsRef, { word, created_at: serverTimestamp() });
        wcInput.value = "";
      } finally {
        wcButton.disabled = false;
      }
    }
    if (wcInput && wcButton && wcCanvas) {
      wordsRef = collection(fdb, "ai_cgm_weight_loss_wordcloud");
      wcButton.addEventListener("click", submitWord);
      wcInput.addEventListener("keydown", e => {
        if (e.key === "Enter") submitWord();
      });
      onSnapshot(query(wordsRef, orderBy("created_at", "asc")), snap => {
        const counts = {};
        snap.forEach(d => {
          const word = String(d.data().word || "").trim();
          if (word) counts[word] = (counts[word] || 0) + 1;
        });
        const data = Object.entries(counts).sort((a, b) => b[1] - a[1]);
        const total = data.reduce((sum, [, count]) => sum + count, 0);
        document.getElementById("wc-total").textContent = total;
        document.getElementById("wc-unique").textContent = data.length;
        document.getElementById("wc-list").innerHTML = data.slice(0, 12).map(([w, c]) => `<div style="display:flex;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.08);padding:6px 0;"><span>${w}</span><b style="color:var(--accent);">${c}</b></div>`).join("") || "<span style='color:#7f93a8;'>尚無資料</span>";
        drawWordCloud(data);
      });
    }
    function drawWordCloud(data) {
      const canvas = document.getElementById("wc-canvas");
      const empty = document.getElementById("wc-empty");
      if (!canvas || typeof WordCloud === "undefined") return;
      const rect = canvas.getBoundingClientRect();
      if (rect.width < 20 || rect.height < 20) return;
      canvas.width = rect.width;
      canvas.height = rect.height;
      if (empty) empty.style.display = data.length ? "none" : "grid";
      if (!data.length) return;
      const max = data[0][1];
      WordCloud(canvas, {
        list: data.map(([w, c]) => [w, Math.max(18, Math.round((c / max) * 72))]),
        gridSize: 6,
        weightFactor: 1,
        fontFamily: '"Noto Sans TC", "Microsoft JhengHei", sans-serif',
        color: () => colors[Math.floor(Math.random() * colors.length)],
        backgroundColor: "transparent",
        rotateRatio: 0.3
      });
    }
    Reveal.on("slidechanged", e => {
      if (e.currentSlide?.id === "slide-wordcloud") {
        setTimeout(() => {
          const rows = [...document.querySelectorAll("#wc-list div")].map(row => [row.firstElementChild.textContent, Number(row.lastElementChild.textContent)]);
          drawWordCloud(rows);
        }, 150);
      }
    });
  </script>
</body>
