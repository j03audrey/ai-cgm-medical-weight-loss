    function renderSlide(s) {

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
    import {
      getFirestore, collection, addDoc, onSnapshot, serverTimestamp, query, orderBy,
      doc, setDoc
    } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAYQhNavPSce17XtvDC5xnXyl9iUhW9KjA",
      authDomain: "teacherstudy-109ef.firebaseapp.com",
      projectId: "teacherstudy-109ef",
      storageBucket: "teacherstudy-109ef.firebasestorage.app",
      messagingSenderId: "196599230156",
      appId: "1:196599230156:web:cfe55d364df3ae1b9d5c69"
    };
    const app = initializeApp(firebaseConfig);
    const fdb = getFirestore(app);

    const pollRef = doc(fdb, "ai_cgm_weight_loss_poll", "slide_18");
    const userId = "u_" + Math.random().toString(36).slice(2, 10);
    document.querySelectorAll(".poll-btn").forEach(btn => {
      btn.addEventListener("click", async () => {
        const data = { updated_at: serverTimestamp() };
        data[`votes.${userId}`] = btn.dataset.vote;
        await setDoc(pollRef, data, { merge: true });
      });
    });
    onSnapshot(pollRef, snap => {
      const votes = Object.values((snap.data() || {}).votes || {});
      const total = votes.length;
      document.getElementById("poll-total").textContent = total;
      for (let i = 0; i < 4; i++) {
        const count = votes.filter(v => String(v) === String(i)).length;
        const pct = total ? Math.round(count / total * 100) : 0;
        document.getElementById(`poll-bar-${i}`).style.width = pct + "%";
        document.getElementById(`poll-pct-${i}`).textContent = pct + "%";
      }
    });

    const wordsRef = collection(fdb, "ai_cgm_weight_loss_wordcloud");
    const colors = ["#4fc3f7", "#e8643a", "#ffb74d", "#81c784", "#ce93d8", "#80deea"];
    const wcInput = document.getElementById("wc-input");
    const wcButton = document.getElementById("wc-btn");
    async function submitWord() {
      const word = wcInput?.value.trim();
      if (!word) return;
      wcButton.disabled = true;
      try {
        await addDoc(wordsRef, { word, created_at: serverTimestamp() });
        wcInput.value = "";
      } finally {
        wcButton.disabled = false;
      }
    }
    wcButton?.addEventListener("click", submitWord);
    wcInput?.addEventListener("keydown", e => {
      if (e.key === "Enter") submitWord();
    });
    function drawWordCloud(data) {
      const canvas = document.getElementById("wc-canvas");
      const empty = document.getElementById("wc-empty");
      if (!canvas || typeof WordCloud === "undefined") return;
      const rect = canvas.getBoundingClientRect();
      if (rect.width < 20 || rect.height < 20) return;
      canvas.width = rect.width;
      canvas.height = rect.height;
      if (empty) empty.style.display = data.length ? "none" : "grid";
      if (!data.length) return;
      const max = data[0][1];
      WordCloud(canvas, {
        list: data.map(([w, c]) => [w, Math.max(18, Math.round((c / max) * 72))]),
        gridSize: 6,
        weightFactor: 1,
        fontFamily: '"Noto Sans TC", "Microsoft JhengHei", sans-serif',
        color: () => colors[Math.floor(Math.random() * colors.length)],
        backgroundColor: "transparent",
        rotateRatio: 0.3
      });
    }
    onSnapshot(query(wordsRef, orderBy("created_at", "asc")), snap => {
      const counts = {};
      snap.forEach(d => {
        const word = String(d.data().word || "").trim();
        if (word) counts[word] = (counts[word] || 0) + 1;
      });
      const data = Object.entries(counts).sort((a, b) => b[1] - a[1]);
      const total = data.reduce((sum, [, count]) => sum + count, 0);
      document.getElementById("wc-total").textContent = total;
      document.getElementById("wc-unique").textContent = data.length;
      document.getElementById("wc-list").innerHTML = data.slice(0, 12).map(([w, c]) => `<div style="display:flex;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.08);padding:6px 0;"><span>${w}</span><b style="color:var(--accent);">${c}</b></div>`).join("") || "<span style='color:#7f93a8;'>尚無資料</span>";
      drawWordCloud(data);
    });
    Reveal.on("slidechanged", e => {
      if (e.currentSlide?.id === "slide-wordcloud") {
        setTimeout(() => {
          const rows = [...document.querySelectorAll("#wc-list div")].map(row => [row.firstElementChild.textContent, Number(row.lastElementChild.textContent)]);
          drawWordCloud(rows);
        }, 150);
      }
    });
  </script>
